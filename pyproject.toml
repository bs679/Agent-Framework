[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "aios"
version = "0.1.0"
description = "CLI for managing OpenClaw agent planes"
requires-python = ">=3.11"
dependencies = [
    "typer>=0.9.0",
    "rich>=13.0.0",
    "docker>=7.0.0",
    "pyyaml>=6.0",
    "pydantic>=2.0.0",
]

[project.scripts]
aios = "provisioning.cli.main:app"

[tool.setuptools.packages.find]
include = ["provisioning*"]

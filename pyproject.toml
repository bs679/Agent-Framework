[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "aios"
version = "0.1.0"
description = "AIOS/PULSE — OpenClaw Multi-Tenant Agent Provisioning CLI"
requires-python = ">=3.10"
dependencies = [
    "click>=8.1",
    "pyyaml>=6.0",
    "python-dotenv>=1.0",
]

[project.scripts]
aios = "provisioning.cli:cli"

[tool.setuptools.packages.find]
include = ["provisioning*"]

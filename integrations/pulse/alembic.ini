# Alembic configuration for Pulse — Phase 9b officer modules
# Run from the repo root: alembic -c integrations/pulse/alembic.ini upgrade head

[alembic]
script_location = integrations/pulse/alembic
prepend_sys_path = .

# DATABASE_URL env var overrides this default (sqlite for dev).
sqlalchemy.url = sqlite:///data/pulse.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CHCA Agent Onboarding</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --border: #0f3460;
      --text: #e0e0e0;
      --text-muted: #a0a0b0;
      --accent: #4ecca3;
      --accent-hover: #3db88f;
      --green: #4ecca3;
      --yellow: #f0c040;
      --orange: #e07030;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'IBM Plex Mono', 'Fira Code', monospace;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    #root { max-width: 720px; margin: 0 auto; padding: 2rem 1.5rem; }

    h1 { color: var(--accent); font-size: 1.4rem; margin-bottom: 0.5rem; }
    h2 { color: var(--accent); font-size: 1.1rem; margin: 1.5rem 0 0.75rem; }

    .subtitle { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 2rem; }

    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1.25rem;
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 0.25rem;
      margin-top: 0.75rem;
    }

    label:first-child { margin-top: 0; }

    input, select, textarea {
      width: 100%;
      padding: 0.5rem 0.75rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.9rem;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
    }

    textarea { min-height: 60px; resize: vertical; }

    select { cursor: pointer; }

    .btn {
      display: inline-block;
      padding: 0.65rem 1.5rem;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 4px;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 1.5rem;
    }

    .btn:hover { background: var(--accent-hover); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .status {
      margin-top: 1rem;
      padding: 0.75rem;
      border-radius: 4px;
      font-size: 0.85rem;
    }

    .status.success { background: rgba(78, 204, 163, 0.15); color: var(--green); }
    .status.error { background: rgba(224, 112, 48, 0.15); color: var(--orange); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>

# AI Routing Configuration — Single Source of Truth
# Never hardcode model choices in application code. Always read from this config.
#
# Environment variable placeholders (${VAR}) are resolved at load time.
# Missing env vars resolve to empty string; boolean vars resolve to false.

models:
  ollama:
    base_url: ${OLLAMA_BASE_URL}        # http://localhost:11434
    model: ${OLLAMA_MODEL}              # llama3.1:8b
    enabled: true
    timeout_seconds: 120

  kimi_k2:
    base_url: https://integrate.api.nvidia.com/v1
    api_key: ${NVIDIA_API_KEY}
    model: moonshotai/kimi-k2
    enabled: ${KIMI_ENABLED}            # false by default, set true when key available
    timeout_seconds: 60

  claude:
    api_key: ${ANTHROPIC_API_KEY}
    model: claude-sonnet-4-6
    enabled: ${CLAUDE_ENABLED}          # false by default
    timeout_seconds: 60

# Routing table — task_type: preferred_model
# sensitive = true means NEVER route to external APIs regardless of preference
routing:
  # --- ALWAYS LOCAL (sensitive data) ---
  grievance_summary:
    model: ollama
    sensitive: true
    fallback: null                      # no fallback — fail rather than leak
    description: "Grievance case analysis and summaries"

  email_triage:
    model: ollama
    sensitive: true
    fallback: null
    description: "Email classification and triage — may contain member info"

  checkin_summary:
    model: ollama
    sensitive: true
    fallback: null
    description: "Morning/evening check-in generation"

  minutes_draft:
    model: ollama
    sensitive: true
    fallback: null
    description: "Meeting minutes — executive session risk"

  wage_costing:
    model: ollama
    sensitive: true
    fallback: null
    description: "Contract costing — negotiation strategy"

  contract_proposal:
    model: ollama
    sensitive: true
    fallback: null
    description: "Contract proposal drafting — negotiation strategy"

  quick_capture:
    model: ollama
    sensitive: true
    fallback: null
    description: "Quick capture — unknown content, default safe"

  weekly_report_summary:
    model: ollama
    sensitive: true
    fallback: null
    description: "Staff activity summaries — internal org data"

  email_thread_summary:
    model: ollama
    sensitive: true
    fallback: null
    description: "Email thread summarization — may contain member data"

  # --- PREFER EXTERNAL (non-sensitive, quality matters) ---
  testimony_draft:
    model: kimi_k2
    sensitive: false
    fallback: ollama
    description: "Legislative testimony — public content, quality critical"

  legislative_summary:
    model: kimi_k2
    sensitive: false
    fallback: ollama
    description: "CT General Assembly hearing summaries"

  agenda_draft:
    model: kimi_k2
    sensitive: false
    fallback: ollama
    description: "Board meeting agenda generation — no member data"

  bls_research_synthesis:
    model: kimi_k2
    sensitive: false
    fallback: ollama
    description: "BLS/public data analysis — no sensitive union data"
